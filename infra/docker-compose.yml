version: "3.9"

name: nextgenjournalism

services:
  postgres:
    image: postgres:16
    container_name: ngj-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ngj
      POSTGRES_PASSWORD: ngj_dev_password
      POSTGRES_DB: nextgenjournalism
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf
      - ../packages/database/postgres/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ngj -d nextgenjournalism"]
      interval: 5s
      timeout: 5s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: ngj-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: ngj-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  debezium:
    image: debezium/connect:2.6
    container_name: ngj-debezium
    restart: unless-stopped
    depends_on:
      - kafka
      - postgres
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: ngj-connect
      CONFIG_STORAGE_TOPIC: ngj_connect_configs
      OFFSET_STORAGE_TOPIC: ngj_connect_offsets
      STATUS_STORAGE_TOPIC: ngj_connect_status

  neo4j:
    image: neo4j:5.22-community
    container_name: ngj-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/ngj_dev_password
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4jdata:/data
      - ./neo4j/conf/neo4j.conf:/conf/neo4j.conf

  redis:
    image: redis:7-alpine
    container_name: ngj-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  go-backend:
    build:
      context: ../apps/go-backend
    container_name: ngj-go-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - ../apps/go-backend/.env
    ports:
      - "8080:8080"

  python-worker:
    build:
      context: ../apps/python-worker
    container_name: ngj-python-worker
    restart: unless-stopped
    depends_on:
      - neo4j
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ngj_dev_password
      POLL_INTERVAL_SECONDS: "30"

volumes:
  pgdata:
  neo4jdata:
